name: CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-egovframe-skeleton
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  frontend-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend entry script
        run: node --check frontend-static/serve-static.mjs

      - name: Check frontend modules
        shell: bash
        run: |
          # ubuntu-latest uses bash here, so find/xargs is intentional.
          find frontend-static/js -type f -name '*.js' -print0 | xargs -0 -r -n1 node --check
