name: CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-egovframe-skeleton
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-static
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-static/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run syntax and unit tests
        run: npm run check:syntax && npm run test:unit

      - name: Run browser regression tests
        run: npx playwright test
