server:
  port: 8080

spring:
  application:
    name: geumcheon-data-platform
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geumcheon_data}
    username: ${DB_USERNAME:geumcheon}
    password: ${DB_PASSWORD:change-me}
  flyway:
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE_MB:50}MB
      max-request-size: ${MAX_UPLOAD_SIZE_MB:50}MB

geumcheon:
  runtime:
    mode: db
  api-keys:
    data-go-kr: ${DATA_GO_KR_API_KEY:}
    seoul-open-api: ${SEOUL_OPEN_API_KEY:}
    vworld: ${VWORLD_API_KEY:}
    sgis: ${SGIS_API_KEY:}
    kosis: ${KOSIS_API_KEY:}
    worknet: ${WORKNET_API_KEY:}
  wifi-relay:
    base-url: ${WIFI_RELAY_BASE_URL:http://127.0.0.1:18088}
    token: ${WIFI_RELAY_TOKEN:}
    schedule-enabled: ${WIFI_RELAY_SCHEDULE_ENABLED:false}
    cron: ${WIFI_RELAY_CRON:0 10 * * * *}
  living-facility-relay:
    base-url: ${LIVING_FACILITY_RELAY_BASE_URL:http://127.0.0.1:18089}
    token: ${LIVING_FACILITY_RELAY_TOKEN:}
  air-quality:
    schedule-enabled: ${AIR_QUALITY_SCHEDULE_ENABLED:true}
    cron: ${AIR_QUALITY_CRON:0 5 */3 * * *}
  collector:
    enabled: ${COLLECTOR_ENABLED:false}
    default-timeout-seconds: ${COLLECTOR_DEFAULT_TIMEOUT_SECONDS:20}
    retry-count: ${COLLECTOR_RETRY_COUNT:3}
    retry-delay-seconds: ${COLLECTOR_RETRY_DELAY_SECONDS:5}
    store-page-size: ${COLLECTOR_STORE_PAGE_SIZE:500}
    store-max-pages: ${COLLECTOR_STORE_MAX_PAGES:200}
    store-page-delay-millis: ${COLLECTOR_STORE_PAGE_DELAY_MILLIS:200}
    schedule-enabled: ${COLLECTOR_SCHEDULE_ENABLED:false}
    cron: ${COLLECTOR_CRON:0 0 4 * * *}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  upload:
    base-path: ${UPLOAD_BASE_PATH:./uploads}
    preview-ttl-minutes: ${UPLOAD_PREVIEW_TTL_MINUTES:15}
    max-preview-drafts: ${UPLOAD_MAX_PREVIEW_DRAFTS:5}
